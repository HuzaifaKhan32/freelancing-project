<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>T-Shirt Emporium - Admin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center bg-background-light p-4 dark:bg-background-dark">
<div class="flex w-full max-w-md flex-col items-center">
<!-- Logo Header -->
<div class="mb-8 flex items-center gap-3">
<div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary text-white">
<span class="material-symbols-outlined text-3xl">shield_person</span>
</div>
<h1 class="text-2xl font-bold text-gray-800 dark:text-gray-200">T-Shirt Emporium</h1>
</div>
<!-- Login Card -->
<div class="w-full rounded-xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-700 dark:bg-background-dark/50 sm:p-8">
<div class="flex flex-col items-center">
<!-- HeadlineText -->
<h2 class="pb-1 text-center text-2xl font-bold tracking-tight text-[#111418] dark:text-white">Admin Login</h2>
<!-- BodyText -->
<p class="pb-6 text-center text-sm font-normal leading-normal text-gray-500 dark:text-gray-400">Welcome back. Please enter your credentials.</p>
<!-- Form -->
<form class="flex w-full flex-col gap-4">
<!-- TextField: Email -->
<div class="flex flex-col">
<label class="pb-2 text-sm font-medium text-[#111418] dark:text-gray-300" for="email">Email Address</label>
<input class="form-input h-12 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-[#dbe0e6] bg-white p-3 text-base font-normal leading-normal text-[#111418] placeholder:text-[#617589] focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary" id="email" placeholder="Enter your email" type="email" value=""/>
</div>
<!-- TextField: Password -->
<div class="flex flex-col">
<label class="pb-2 text-sm font-medium text-[#111418] dark:text-gray-300" for="password">Password</label>
<div class="relative flex w-full flex-1 items-stretch">
<input class="form-input h-12 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-[#dbe0e6] bg-white p-3 pr-10 text-base font-normal leading-normal text-[#111418] placeholder:text-[#617589] focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary" id="password" placeholder="Enter your password" type="password" value=""/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 text-[#617589] dark:text-gray-400">
<span class="material-symbols-outlined cursor-pointer text-xl">visibility</span>
</div>
</div>
</div>
<!-- MetaText: Forgot Password -->
<div class="flex justify-end pt-1">
<a class="text-sm font-normal leading-normal text-primary underline hover:text-primary/80 dark:text-primary/90 dark:hover:text-primary/70" href="#">Forgot your password?</a>
</div>
<!-- Login Button -->
<button class="mt-4 flex h-12 w-full items-center justify-center rounded-lg bg-primary px-4 py-2 text-base font-semibold text-white transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:ring-offset-2 dark:focus:ring-offset-background-dark" type="submit">Log In</button>
</form>
</div>
</div>
<!-- Footer Text -->
<p class="mt-8 text-center text-xs text-gray-500 dark:text-gray-400">© 2024 T-Shirt Emporium. All Rights Reserved.</p>
</div>
</div>
</body></html>
